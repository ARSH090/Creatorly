version: "2"
type: backend
tech_stack:
  - TypeScript
  - Next.js
  - MongoDB
  - Mongoose
  - Clerk
  - Razorpay
features:
  - name: Creator Profile & Storefront API
    description: CRUD operations for creator profiles, storefront layouts, and theme settings.
    files:
      - src/app/api/creator/profile/route.ts
      - src/lib/models/CreatorProfile.ts
    endpoints:
      - method: GET
        path: /api/creator/profile
        description: Get the current creator's profile and storefront configuration.
        auth_required: true
      - method: PATCH
        path: /api/creator/profile
        description: Update storefront layout and theme settings.
        auth_required: true
  - name: Product Management API
    description: APIs for managing creator products.
    files:
      - src/app/api/products/route.ts
      - src/lib/models/Product.ts
    endpoints:
      - method: GET
        path: /api/products
        description: List products for the authenticated creator.
        auth_required: true
      - method: POST
        path: /api/products
        description: Create a new product.
        auth_required: true
  - name: Order Management API
    description: APIs for processing and managing orders.
    files:
      - src/app/api/orders/route.ts
      - src/lib/models/Order.ts
    endpoints:
      - method: GET
        path: /api/orders
        description: List orders for the authenticated creator.
        auth_required: true
  - name: Social Feed & oEmbed API
    description: Proxy service for fetching social media embed data.
    files:
      - src/app/api/storefront/oembed/route.ts
    endpoints:
      - method: GET
        path: /api/storefront/oembed
        description: Fetch oEmbed data for a given platform and URL.
        auth_required: false
  - name: Admin Management API
    description: System-wide administrative operations.
    files:
      - src/app/api/admin/announcements/route.ts
      - src/app/api/admin/coupons/route.ts
    endpoints:
      - method: GET
        path: /api/admin/announcements
        description: List system announcements.
        auth_required: true
known_limitations:
  - issue: Minimal input validation on some storefront settings
    location: src/app/api/creator/profile/route.ts
    impact: Potentially allows malformed JSON in blocksLayout
