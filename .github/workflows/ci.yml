name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mongodb:
        image: mongo:7
        ports: ['27017:27017']
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']

    env:
      MONGODB_URI: mongodb://localhost:27017/creatorly_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      JWT_SECRET: test_jwt_secret_ci_only
      RAZORPAY_KEY_SECRET: test_razorpay_secret
      RAZORPAY_WEBHOOK_SECRET: test_webhook_secret
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_RAZORPAY_KEY_ID: rzp_test_placeholder

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Run linting
        run: npm run lint
        continue-on-error: true

      - name: Run unit + security tests with coverage
        run: npm run test:coverage -- --forceExit --testTimeout=30000
        env:
          CI: true

      - name: Security dependency audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Build check
        run: npm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || 'pk_test_placeholder' }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY || 'sk_test_placeholder' }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_RAZORPAY_KEY_ID: rzp_test_placeholder

  e2e:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run public E2E tests
        run: npx playwright test tests/e2e/09-public-storefront.spec.ts tests/e2e/01-pages-load.spec.ts --project=public
        env:
          BASE_URL: ${{ secrets.STAGING_URL || 'http://localhost:3000' }}
        continue-on-error: true
